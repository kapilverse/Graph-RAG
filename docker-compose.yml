version: "3.9"

services:
  # ===========================================================================
  # Neo4j — knowledge graph store
  # ===========================================================================
  neo4j:
    image: neo4j:5.26.0
    container_name: graphrag-neo4j
    ports:
      - "7474:7474"   # browser UI (http://localhost:7474)
      - "7687:7687"   # bolt (cypher)
    environment:
      - NEO4J_AUTH=neo4j/graphrag123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # Qdrant — vector store for chunks + community summaries
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: graphrag-qdrant
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # Backend — FastAPI (graph RAG pipeline + API)
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: graphrag-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./models_cache:/models_cache
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ===========================================================================
  # Frontend — React + Vite (dev server)
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: graphrag-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
